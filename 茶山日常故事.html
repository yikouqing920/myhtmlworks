<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 移动端视口优化 + 缓存加速 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="public, max-age=31536000">
    <title>茶山日常视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .video-box {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
        }
        .video-title {
            font-size: 25px;
            font-weight: bold;
            color: gold;
            margin-bottom: 15px;
        }
        video {
            width: 100%;
            height: auto;
            border: none;
            outline: none;
            display: block;
            background: #f5f5f5;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="video-box">
        <h3 class="video-title">茶山日常</h3>
        <video controls preload="metadata"
               playsinline webkit-playsinline x5-playsinline
               crossorigin="anonymous" preload="auto">
            <!-- 核心修改：GitHub Raw → jsDelivr CDN 地址，彻底解决跨域拦截 -->
            <source src="https://cdn.jsdelivr.net/gh/yikouqing920/myhtmlworks@main/81201399.mp4?v=1.0" type="video/mp4">
            您的浏览器不支持HTML5视频播放，请更换现代浏览器尝试
        </video>
    </div>
</body>
</html>
