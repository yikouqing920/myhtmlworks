<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CSS3动画</title>
<style>
  /* 父容器样式 */
  #main {
    width: 150px;
    height: 150px;
    border: 1px black solid;
    /* 让子元素相对父容器定位，保证动画在框内可见 */
    position: relative;
  }
  /* 动画方块样式 */
  #box {
    width: 50px;
    height: 50px;
    background: red;
    /* 动画：1秒时长，动画名move，循环播放 */
    animation: 1s move infinite;
    position: relative;
  }
  /* 定义关键帧动画 */
  @keyframes move {
    0% {
      transform: translate(0, 0);
    }
    100% {
      transform: translate(100px, 0);
    }
  }
</style>
</head>
<body>
  <div id="main">
    <div id="box"></div>
  </div>
</body>
</html>
