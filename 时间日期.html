<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时日期时间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 页面居中，全屏适配 */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: "Microsoft YaHei", sans-serif;
            gap: 20px;
        }
        /* 日期样式：大字号，粗体 */
        .date-box {
            font-size: 48px;
            font-weight: bold;
            color: #0000ff; /* 统一蓝色 */
        }
        /* 时间样式：超大字号，粗体，流动感视觉 */
        .time-box {
            font-size: 64px;
            font-weight: bold;
            color: #0000ff; /* 统一蓝色 */
            letter-spacing: 2px;
        }
        /* 移动端适配，缩小字号 */
        @media (max-width: 768px) {
            .date-box {
                font-size: 32px;
            }
            .time-box {
                font-size: 48px;
            }
        }
        @media (max-width: 480px) {
            .date-box {
                font-size: 24px;
            }
            .time-box {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- 日期展示：年 月 日 星期 -->
    <div class="date-box" id="dateBox"></div>
    <!-- 时间展示：时:分:秒（24小时制） -->
    <div class="time-box" id="timeBox"></div>

    <script>
        // 获取显示容器
        const dateBox = document.getElementById('dateBox');
        const timeBox = document.getElementById('timeBox');
        // 星期文字映射
        const weekArr = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        // 核心方法：更新日期和时间
        function updateDateTime() {
            const now = new Date(); // 获取当前系统时间
            // 1. 处理日期：年、月（补0）、日（补0）、星期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0'); // 月份从0开始，补0到2位
            const day = String(now.getDate()).padStart(2, '0'); // 日期补0到2位
            const week = weekArr[now.getDay()]; // 星期从0开始（0=周日）
            // 渲染日期
            dateBox.innerText = `${year}年${month}月${day}日 ${week}`;

            // 2. 处理时间：时（补0）、分（补0）、秒（补0），24小时制
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            // 渲染时间，实现秒级流动刷新
            timeBox.innerText = `${hour}:${minute}:${second}`;
        }

        // 页面加载立即执行一次，避免空白
        updateDateTime();
        // 每1000毫秒（1秒）执行一次，实现时间流动
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
