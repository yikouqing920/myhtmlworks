<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>实时日期时间 | 全球天气查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        /* 页面全局样式：渐变背景+居中布局 */
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 25px;
        }
        /* 容器包裹：统一控制宽度+卡片化风格 */
        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 日期时间模块：蓝色主题+居中显示 */
        .datetime-module {
            text-align: center;
            color: #fff;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(5px);
        }
        .date-box {
            font-size: 48px;
            font-weight: bold;
            color: #4fc3f7; /* 明亮蓝色，适配深色背景 */
            margin-bottom: 10px;
        }
        .time-box {
            font-size: 64px;
            font-weight: bold;
            color: #4fc3f7;
            letter-spacing: 2px;
        }
        /* 天气模块：白色卡片+阴影质感 */
        .weather-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }
        .weather-header {
            margin-bottom: 24px;
            text-align: center;
        }
        .weather-title {
            color: #1e2a3a;
            font-size: 28px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .weather-subtitle {
            color: #5a6e7c;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 6px;
        }
        /* 城市输入+按钮区域 */
        .input-group {
            display: flex;
            margin-bottom: 24px;
            gap: 8px;
        }
        .city-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            background: white;
        }
        .city-input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .btn {
            background: linear-gradient(105deg, #2c7da0, #1f5068);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background: linear-gradient(105deg, #1f5e7e, #163f52);
            transform: scale(0.97);
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* 加载/错误提示 */
        .loading {
            display: none;
            color: #2c7da0;
            margin: 20px 0;
            font-weight: 500;
            background: #eef2ff;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
        }
        .error {
            background: #ffe9e6;
            color: #bc3900;
            padding: 14px;
            border-radius: 40px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 5px solid #bc3900;
            text-align: center;
        }
        /* 天气卡片内容 */
        .weather-card {
            background: #f9fbfd;
            border-radius: 28px;
            padding: 24px 20px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(44,125,160,0.2);
        }
        .location h2 {
            font-size: 26px;
            color: #0b3b4f;
            margin-bottom: 5px;
            text-align: center;
        }
        .update-time {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 12px;
            text-align: center;
        }
        .temp {
            font-size: 54px;
            font-weight: 800;
            color: #1e4663;
            margin: 12px 0 6px;
            letter-spacing: -2px;
            text-align: center;
        }
        .condition {
            font-size: 20px;
            color: #2c7da0;
            font-weight: 600;
            margin-bottom: 20px;
            background: #e6f4fa;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: fit-content;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 20px;
        }
        .detail-item {
            background: white;
            padding: 14px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2edf2;
            text-align: center;
        }
        .detail-label {
            color: #5f7f8c;
            font-size: 12px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .detail-value {
            color: #1f4e6e;
            font-weight: 700;
            font-size: 18px;
        }
        /* 底部说明 */
        .footer {
            margin-top: 24px;
            color: #7a8e9b;
            font-size: 11px;
            text-align: center;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .date-box {
                font-size: 32px;
            }
            .time-box {
                font-size: 48px;
            }
            .temp {
                font-size: 44px;
            }
        }
        @media (max-width: 480px) {
            .date-box {
                font-size: 24px;
            }
            .time-box {
                font-size: 36px;
            }
            .weather-container {
                padding: 20px 16px;
            }
            .input-group {
                flex-direction: column;
            }
            .btn {
                padding: 14px 20px;
                width: 100%;
            }
            .detail-item {
                padding: 10px 5px;
            }
            .detail-value {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 日期时间模块 -->
        <div class="datetime-module">
            <div class="date-box" id="dateBox"></div>
            <div class="time-box" id="timeBox"></div>
        </div>

        <!-- 天气查询模块 -->
        <div class="weather-container">
            <div class="weather-header">
                <h2 class="weather-title">🌤️ 晴雨先知</h2>
                <span class="weather-subtitle">全球城市 · 实时天气</span>
            </div>
            <div class="input-group">
                <input type="text" class="city-input" id="cityInput" placeholder="城市名，例如：广州、北京、伦敦" value="广州">
                <button class="btn" id="searchBtn">查询天气</button>
                <button class="btn" id="refreshBtn">刷新</button>
            </div>
            <div class="loading" id="loading">⏳ 获取气象数据中，请稍后...</div>
            <div class="weather-card" id="weatherCard">
                <div class="location">
                    <h2 id="cityName">广州市</h2>
                    <div class="update-time" id="updateTime">实时天气</div>
                </div>
                <div class="temp" id="temperature">--°C</div>
                <div class="condition" id="weatherText">--</div>
                <div class="details">
                    <div class="detail-item">
                        <div class="detail-label">🌡️ 体感温度</div>
                        <div class="detail-value" id="feelsLike">--°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">💧 湿度</div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">🍃 风向</div>
                        <div class="detail-value" id="windDir">--</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">💨 风速</div>
                        <div class="detail-value" id="windScale">-- km/h</div>
                    </div>
                </div>
            </div>
            <div class="error" id="errorMsg"></div>
            <div class="footer">🌍 数据源：Open-Meteo 高精度气象服务 | 日期时间秒级刷新 | 天气每小时自动更新</div>
        </div>
    </div>

    <script>
        // ===================== 日期时间模块 =====================
        const dateBox = document.getElementById('dateBox');
        const timeBox = document.getElementById('timeBox');
        const weekArr = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        // 更新日期时间（秒级刷新）
        function updateDateTime() {
            const now = new Date();
            // 处理日期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = weekArr[now.getDay()];
            dateBox.innerText = `${year}年${month}月${day}日 ${week}`;
            // 处理时间
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            timeBox.innerText = `${hour}:${minute}:${second}`;
        }
        // 初始化并每秒刷新
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ===================== 天气查询模块 =====================
        // DOM元素获取
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const loadingDiv = document.getElementById('loading');
        const weatherCard = document.getElementById('weatherCard');
        const errorDiv = document.getElementById('errorMsg');

        // 天气显示字段
        const cityNameSpan = document.getElementById('cityName');
        const updateTimeSpan = document.getElementById('updateTime');
        const temperatureSpan = document.getElementById('temperature');
        const weatherTextSpan = document.getElementById('weatherText');
        const feelsLikeSpan = document.getElementById('feelsLike');
        const humiditySpan = document.getElementById('humidity');
        const windDirSpan = document.getElementById('windDir');
        const windScaleSpan = document.getElementById('windScale');

        // 全局变量：当前查询城市
        let currentCity = cityInput.value.trim() || '广州';

        // 辅助函数：风向角度转中文
        function degToDirection(deg) {
            if (deg === undefined || deg === null) return '--';
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(deg / 45) % 8;
            return directions[index];
        }

        // 辅助函数：风速转风级
        function windSpeedToScale(speedKmh) {
            if (speedKmh === undefined) return '--';
            if (speedKmh < 1) return '0级 (无风)';
            if (speedKmh <= 5) return '1级 (软风)';
            if (speedKmh <= 11) return '2级 (轻风)';
            if (speedKmh <= 19) return '3级 (微风)';
            if (speedKmh <= 28) return '4级 (和风)';
            if (speedKmh <= 38) return '5级 (清风)';
            if (speedKmh <= 49) return '6级 (强风)';
            if (speedKmh <= 61) return '7级 (疾风)';
            if (speedKmh <= 74) return '8级 (大风)';
            if (speedKmh <= 88) return '9级 (烈风)';
            return '10+级 (狂风)';
        }

        // 显示/隐藏错误
        function showError(message) {
            errorDiv.textContent = `⚠️ ${message}`;
            errorDiv.style.display = 'block';
            weatherCard.style.display = 'none';
            loadingDiv.style.display = 'none';
        }
        function hideError() {
            errorDiv.style.display = 'none';
        }

        // 城市名转经纬度
        async function getCoordinates(cityName) {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=zh&format=json`;
            const response = await fetch(geoUrl);
            if (!response.ok) throw new Error(`地理编码服务异常 (${response.status})`);
            const data = await response.json();
            if (!data.results || data.results.length === 0) {
                throw new Error(`未找到城市“${cityName}”，请检查名称或尝试英文名`);
            }
            const result = data.results[0];
            return {
                name: result.name,
                latitude: result.latitude,
                longitude: result.longitude,
                admin1: result.admin1 || ''
            };
        }

        // 获取实时天气
        async function getCurrentWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,apparent_temperature,windspeed_10m,winddirection_10m,weathercode&timezone=auto`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`天气服务请求失败 (${response.status})`);
            const data = await response.json();
            
            const current = data.current_weather;
            if (!current) throw new Error('无法获取当前天气数据');

            // 匹配最近的小时数据
            const targetTime = current.time;
            const hourlyTimes = data.hourly.time;
            let idx = hourlyTimes.indexOf(targetTime);
            if (idx === -1) idx = hourlyTimes.length - 1;

            // 提取天气数据
            const humidity = data.hourly.relativehumidity_2m?.[idx] ?? '—';
            const apparentTemp = data.hourly.apparent_temperature?.[idx] ?? current.temperature;
            const windSpeed = current.windspeed;
            const windDirection = current.winddirection;
            const weatherCode = data.hourly.weathercode?.[idx];

            // 天气代码转文字描述
            let weatherConditionText = "晴间多云";
            if (weatherCode !== undefined) {
                if (weatherCode === 0) weatherConditionText = "晴天";
                else if (weatherCode === 1 || weatherCode === 2) weatherConditionText = "晴间多云";
                else if (weatherCode === 3) weatherConditionText = "阴天";
                else if (weatherCode >= 45 && weatherCode <= 48) weatherConditionText = "雾天";
                else if (weatherCode >= 51 && weatherCode <= 67) weatherConditionText = "细雨/毛毛雨";
                else if (weatherCode >= 61 && weatherCode <= 65) weatherConditionText = "雨天";
                else if (weatherCode >= 71 && weatherCode <= 77) weatherConditionText = "雪天";
                else if (weatherCode >= 80 && weatherCode <= 82) weatherConditionText = "骤雨";
                else if (weatherCode >= 95 && weatherCode <= 99) weatherConditionText = "雷暴";
            }

            return {
                temperature: Math.round(current.temperature),
                feelsLike: Math.round(apparentTemp),
                humidity: Math.round(humidity),
                windSpeed: Math.round(windSpeed * 10) / 10,
                windDirection: windDirection,
                windDirectionText: degToDirection(windDirection),
                weatherText: weatherConditionText,
                time: current.time
            };
        }

        // 主查询函数
        async function queryWeather() {
            const cityName = currentCity.trim();
            if (!cityName) {
                showError('请输入城市名称');
                return;
            }

            // UI状态重置
            hideError();
            loadingDiv.style.display = 'block';
            weatherCard.style.display = 'none';

            try {
                // 1. 获取坐标
                const geo = await getCoordinates(cityName);
                const fullCityName = geo.admin1 ? `${geo.name}, ${geo.admin1}` : geo.name;

                // 2. 获取天气
                const weather = await getCurrentWeather(geo.latitude, geo.longitude);

                // 3. 渲染数据
                cityNameSpan.textContent = fullCityName;
                const date = new Date(weather.time);
                updateTimeSpan.textContent = `⏱️ ${date.toLocaleString('zh-CN', {hour12: false})}`;
                temperatureSpan.textContent = `${weather.temperature}°C`;
                weatherTextSpan.textContent = weather.weatherText;
                feelsLikeSpan.textContent = `${weather.feelsLike}°C`;
                humiditySpan.textContent = `${weather.humidity}%`;
                windDirSpan.textContent = weather.windDirectionText;
                const windScaleDesc = windSpeedToScale(weather.windSpeed);
                windScaleSpan.innerHTML = `${weather.windSpeed} km/h <span style="font-size:12px; color:#5f7f8c;">(${windScaleDesc})</span>`;

                weatherCard.style.display = 'block';
                loadingDiv.style.display = 'none';
            } catch (err) {
                console.error("天气查询失败：", err);
                let userMsg = err.message || "网络异常，请重试";
                if (err.message.includes("Failed to fetch")) userMsg = "网络连接失败，请检查网络";
                showError(userMsg);
                loadingDiv.style.display = 'none';
            }
        }

        // 事件绑定
        searchBtn.addEventListener('click', () => {
            const inputCity = cityInput.value.trim();
            if (inputCity) currentCity = inputCity;
            queryWeather();
        });
        refreshBtn.addEventListener('click', queryWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const inputCity = cityInput.value.trim();
                if (inputCity) currentCity = inputCity;
                queryWeather();
            }
        });

        // 初始化：页面加载后查询默认城市天气
        window.addEventListener('DOMContentLoaded', queryWeather);
        // 每小时（3600000毫秒）自动刷新天气
        setInterval(queryWeather, 3600000);
    </script>
</body>
</html>
