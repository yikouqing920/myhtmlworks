<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天气应用 | React + 响应式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2d8cf0;
            --primary-light: #5cadff;
            --primary-dark: #1a73e8;
            --success: #19be6b;
            --warning: #ff9900;
            --danger: #ed3f14;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #17233d;
            --text-secondary: #515a6e;
            --text-light: #808695;
            --border-color: #dcdee2;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #2d2d2d;
                --text-primary: #e6e6e6;
                --text-secondary: #b3b3b3;
                --text-light: #808080;
                --border-color: #404040;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: var(--spacing-md);
            transition: background-color 0.3s;
        }
        #root {
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
    <!-- React 和 Babel 运行时 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 主应用组件
        const { useState, useEffect, useRef } = React;
        const WeatherApp = () => {
            const [city, setCity] = useState('广州');
            const [weather, setWeather] = useState(null);
            const [forecast, setForecast] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [isCelsius, setIsCelsius] = useState(true);
            const [theme, setTheme] = useState('light');
            
            // 模拟的天气数据（实际项目会用真实API）
            const mockWeatherData = {
                '广州': {
                    temp: 24,
                    feelsLike: 26,
                    condition: '多云',
                    humidity: 65,
                    windSpeed: 12,
                    windDir: '东南风',
                    icon: '☁️',
                    aqi: 45
                },
                '北京': {
                    temp: 18,
                    feelsLike: 16,
                    condition: '晴',
                    humidity: 40,
                    windSpeed: 18,
                    windDir: '北风',
                    icon: '☀️',
                    aqi: 85
                },
                '上海': {
                    temp: 22,
                    feelsLike: 24,
                    condition: '小雨',
                    humidity: 78,
                    windSpeed: 8,
                    windDir: '东风',
                    icon: '🌧️',
                    aqi: 60
                }
            };
            const mockForecast = [
                { day: '今天', high: 26, low: 20, condition: '多云', icon: '☁️' },
                { day: '明天', high: 28, low: 22, condition: '晴', icon: '☀️' },
                { day: '后天', high: 25, low: 21, condition: '阵雨', icon: '🌦️' },
                { day: '周日', high: 23, low: 19, condition: '阴', icon: '🌥️' },
                { day: '周一', high: 24, low: 20, condition: '多云', icon: '☁️' }
            ];
            // 初始化天气数据
            useEffect(() => {
                fetchWeather('广州');
            }, []);
            // 监听系统主题
            useEffect(() => {
                const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleChange = (e) => setTheme(e.matches ? 'dark' : 'light');
                darkModeMediaQuery.addListener(handleChange);
                return () => darkModeMediaQuery.removeListener(handleChange);
            }, []);
            const fetchWeather = (cityName) => {
                setLoading(true);
                setError('');
                
                // 模拟API延迟
                setTimeout(() => {
                    if (mockWeatherData[cityName]) {
                        setWeather(mockWeatherData[cityName]);
                        setForecast(mockForecast);
                        setCity(cityName);
                    } else {
                        setError(`未找到城市 "${cityName}" 的天气信息`);
                    }
                    setLoading(false);
                }, 800);
            };
            const handleSearch = (e) => {
                e.preventDefault();
                if (city.trim()) {
                    fetchWeather(city.trim());
                }
            };
            const toggleTempUnit = () => {
                setIsCelsius(!isCelsius);
            };
            const convertTemp = (temp) => {
                if (!isCelsius) {
                    return Math.round((temp * 9/5) + 32);
                }
                return temp;
            };
            const getTempUnit = () => isCelsius ? '°C' : '°F';
            const getAQILevel = (aqi) => {
                if (aqi <= 50) return { level: '优', color: '#19be6b' };
                if (aqi <= 100) return { level: '良', color: '#ff9900' };
                return { level: '差', color: '#ed3f14' };
            };
            return (
                <div className="app-container">
                    {/* 头部 */}
                    <header className="app-header">
                        <div className="header-content">
                            <h1>🌤️ 天气助手</h1>
                            <div className="header-actions">
                                <button 
                                    className="theme-toggle"
                                    onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                                >
                                    {theme === 'light' ? '🌙' : '☀️'}
                                </button>
                                <button className="unit-toggle" onClick={toggleTempUnit}>
                                    {isCelsius ? '°C/°F' : '°F/°C'}
                                </button>
                            </div>
                        </div>
                        
                        {/* 搜索栏 */}
                        <form className="search-bar" onSubmit={handleSearch}>
                            <input
                                type="text"
                                value={city}
                                onChange={(e) => setCity(e.target.value)}
                                placeholder="输入城市名称..."
                                className="search-input"
                                aria-label="搜索城市天气"
                            />
                            <button type="submit" className="search-btn" disabled={loading}>
                                {loading ? '搜索中...' : '🔍'}
                            </button>
                        </form>
                    </header>
                    {/* 错误提示 */}
                    {error && (
                        <div className="error-message">
                            <span>⚠️</span> {error}
                        </div>
                    )}
                    {/* 主内容区域 */}
                    <main className="main-content">
                        {weather && (
                            <>
                                {/* 当前天气卡片 */}
                                <div className="current-weather-card">
                                    <div className="current-weather-header">
                                        <h2>{city}</h2>
                                        <div className="temp-display">
                                            <span className="current-temp">
                                                {convertTemp(weather.temp)}
                                                <sup>{getTempUnit()}</sup>
                                            </span>
                                            <div className="weather-condition">
                                                <span className="weather-icon">{weather.icon}</span>
                                                <span>{weather.condition}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="weather-details">
                                        <div className="detail-item">
                                            <span className="detail-label">体感温度</span>
                                            <span className="detail-value">
                                                {convertTemp(weather.feelsLike)}{getTempUnit()}
                                            </span>
                                        </div>
                                        <div className="detail-item">
                                            <span className="detail-label">湿度</span>
                                            <span className="detail-value">{weather.humidity}%</span>
                                        </div>
                                        <div className="detail-item">
                                            <span className="detail-label">风速</span>
                                            <span className="detail-value">{weather.windSpeed} km/h</span>
                                        </div>
                                        <div className="detail-item">
                                            <span className="detail-label">风向</span>
                                            <span className="detail-value">{weather.windDir}</span>
                                        </div>
                                        <div className="detail-item">
                                            <span className="detail-label">空气质量</span>
                                            <span className="detail-value" style={{
                                                color: getAQILevel(weather.aqi).color,
                                                fontWeight: 'bold'
                                            }}>
                                                {getAQILevel(weather.aqi).level} ({weather.aqi})
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                {/* 天气预报 */}
                                <div className="forecast-section">
                                    <h3>5天预报</h3>
                                    <div className="forecast-list">
                                        {forecast.map((day, index) => (
                                            <div key={index} className="forecast-item">
                                                <div className="forecast-day">{day.day}</div>
                                                <div className="forecast-icon">{day.icon}</div>
                                                <div className="forecast-condition">{day.condition}</div>
                                                <div className="forecast-temp">
                                                    <span className="temp-high">{convertTemp(day.high)}°</span>
                                                    <span className="temp-low">/{convertTemp(day.low)}°</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {/* 天气提示卡片 */}
                                <div className="tips-section">
                                    <h3>📋 今日生活提示</h3>
                                    <div className="tips-grid">
                                        <div className="tip-card">
                                            <div className="tip-icon">👕</div>
                                            <div className="tip-content">
                                                <h4>穿衣建议</h4>
                                                <p>天气舒适，建议穿薄外套或长袖衬衫</p>
                                            </div>
                                        </div>
                                        <div className="tip-card">
                                            <div className="tip-icon">☂️</div>
                                            <div className="tip-content">
                                                <h4>出行建议</h4>
                                                <p>天气良好，适宜户外活动</p>
                                            </div>
                                        </div>
                                        <div className="tip-card">
                                            <div className="tip-icon">🏃</div>
                                            <div className="tip-content">
                                                <h4>运动建议</h4>
                                                <p>空气质量优良，适合户外锻炼</p>
                                            </div>
                                        </div>
                                        <div className="tip-card">
                                            <div className="tip-icon">😷</div>
                                            <div className="tip-content">
                                                <h4>健康建议</h4>
                                                <p>天气舒适，注意早晚温差</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>
                    {/* 底部信息 */}
                    <footer className="app-footer">
                        <p>数据更新于 {new Date().toLocaleTimeString('zh-CN')}</p>
                        <p className="footer-note">OPPO手机适配 | React 18 | 响应式设计</p>
                    </footer>
                </div>
            );
        };
        // 应用容器样式
        const styles = `
            .app-container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            /* 头部样式 */
            .app-header {
                background: var(--card-bg);
                border-radius: var(--radius-lg);
                padding: var(--spacing-lg);
                margin-bottom: var(--spacing-lg);
                box-shadow: var(--shadow);
            }
            
            .header-content {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--spacing-lg);
            }
            
            .app-header h1 {
                font-size: 24px;
                color: var(--primary);
                margin: 0;
            }
            
            .header-actions {
                display: flex;
                gap: var(--spacing-sm);
            }
            
            .theme-toggle, .unit-toggle {
                background: var(--primary);
                color: white;
                border: none;
                border-radius: var(--radius-sm);
                padding: 8px 12px;
                cursor: pointer;
                font-size: 16px;
                transition: all 0.2s;
            }
            
            .theme-toggle:hover, .unit-toggle:hover {
                background: var(--primary-dark);
                transform: translateY(-1px);
            }
            
            /* 搜索栏 */
            .search-bar {
                display: flex;
                gap: var(--spacing-sm);
            }
            
            .search-input {
                flex: 1;
                padding: 12px 16px;
                border: 2px solid var(--border-color);
                border-radius: var(--radius-md);
                font-size: 16px;
                background: var(--card-bg);
                color: var(--text-primary);
                transition: border-color 0.3s;
            }
            
            .search-input:focus {
                outline: none;
                border-color: var(--primary);
            }
            
            .search-btn {
                background: var(--primary);
                color: white;
                border: none;
                border-radius: var(--radius-md);
                padding: 0 24px;
                font-size: 18px;
                cursor: pointer;
                transition: background 0.3s;
            }
            
            .search-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            
            .search-btn:hover:not(:disabled) {
                background: var(--primary-dark);
            }
            
            /* 错误信息 */
            .error-message {
                background: #ffebee;
                color: #c62828;
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                display: flex;
                align-items: center;
                gap: var(--spacing-sm);
            }
            
            /* 当前天气卡片 */
            .current-weather-card {
                background: linear-gradient(135deg, var(--primary-light), var(--primary));
                color: white;
                border-radius: var(--radius-lg);
                padding: var(--spacing-xl);
                margin-bottom: var(--spacing-lg);
                box-shadow: var(--shadow);
            }
            
            .current-weather-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: var(--spacing-lg);
            }
            
            .current-weather-header h2 {
                font-size: 28px;
                margin: 0;
            }
            
            .temp-display {
                text-align: right;
            }
            
            .current-temp {
                font-size: 48px;
                font-weight: bold;
                line-height: 1;
            }
            
            .current-temp sup {
                font-size: 24px;
                font-weight: normal;
            }
            
            .weather-condition {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: var(--spacing-xs);
                margin-top: var(--spacing-xs);
            }
            
            .weather-icon {
                font-size: 24px;
            }
            
            /* 天气详情 */
            .weather-details {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: var(--spacing-md);
                background: rgba(255, 255, 255, 0.1);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                backdrop-filter: blur(10px);
            }
            
            .detail-item {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            
            .detail-label {
                font-size: 12px;
                opacity: 0.9;
            }
            
            .detail-value {
                font-size: 16px;
                font-weight: 600;
            }
            
            /* 天气预报 */
            .forecast-section {
                background: var(--card-bg);
                border-radius: var(--radius-lg);
                padding: var(--spacing-lg);
                margin-bottom: var(--spacing-lg);
                box-shadow: var(--shadow);
            }
            
            .forecast-section h3 {
                margin-bottom: var(--spacing-md);
                color: var(--text-primary);
            }
            
            .forecast-list {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: var(--spacing-md);
            }
            
            .forecast-item {
                text-align: center;
                padding: var(--spacing-md);
                background: var(--bg-color);
                border-radius: var(--radius-md);
                transition: transform 0.2s;
            }
            
            .forecast-item:hover {
                transform: translateY(-2px);
            }
            
            .forecast-day {
                font-weight: 600;
                margin-bottom: 8px;
                color: var(--text-secondary);
            }
            
            .forecast-icon {
                font-size: 24px;
                margin-bottom: 8px;
            }
            
            .forecast-condition {
                font-size: 12px;
                color: var(--text-light);
                margin-bottom: 8px;
            }
            
            .forecast-temp {
                font-weight: 600;
            }
            
            .temp-high {
                color: var(--text-primary);
            }
            
            .temp-low {
                color: var(--text-light);
            }
            
            /* 生活提示 */
            .tips-section {
                background: var(--card-bg);
                border-radius: var(--radius-lg);
                padding: var(--spacing-lg);
                margin-bottom: var(--spacing-lg);
                box-shadow: var(--shadow);
            }
            
            .tips-section h3 {
                margin-bottom: var(--spacing-md);
                color: var(--text-primary);
            }
            
            .tips-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: var(--spacing-md);
            }
            
            .tip-card {
                display: flex;
                align-items: center;
                gap: var(--spacing-md);
                padding: var(--spacing-md);
                background: var(--bg-color);
                border-radius: var(--radius-md);
                transition: all 0.2s;
            }
            
            .tip-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }
            
            .tip-icon {
                font-size: 24px;
                min-width: 40px;
                text-align: center;
            }
            
            .tip-content h4 {
                margin: 0 0 4px 0;
                color: var(--text-primary);
            }
            
            .tip-content p {
                margin: 0;
                font-size: 12px;
                color: var(--text-light);
            }
            
            /* 底部 */
            .app-footer {
                text-align: center;
                padding: var(--spacing-lg);
                color: var(--text-light);
                font-size: 14px;
                margin-top: auto;
            }
            
            .footer-note {
                margin-top: 8px;
                font-size: 12px;
                opacity: 0.8;
            }
            
            /* 响应式设计 */
            @media (max-width: 768px) {
                :root {
                    --spacing-lg: 16px;
                    --spacing-xl: 20px;
                }
                
                .header-content {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: var(--spacing-md);
                }
                
                .header-actions {
                    align-self: flex-end;
                }
                
                .current-weather-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
                
                .temp-display {
                    text-align: left;
                    margin-top: var(--spacing-md);
                }
                
                .weather-details {
                    grid-template-columns: repeat(2, 1fr);
                }
                
                .forecast-list {
                    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                }
                
                .tips-grid {
                    grid-template-columns: 1fr;
                }
            }
            
            @media (max-width: 480px) {
                .weather-details {
                    grid-template-columns: 1fr;
                }
                
                .forecast-list {
                    overflow-x: auto;
                    display: flex;
                    padding-bottom: 8px;
                }
                
                .forecast-item {
                    min-width: 100px;
                }
                
                .search-bar {
                    flex-direction: column;
                }
                
                .search-input, .search-btn {
                    width: 100%;
                }
            }
        `;
        // 添加样式到页面
        const styleSheet = document.createElement("style");
        styleSheet.textContent = styles;
        document.head.appendChild(styleSheet);
        // 渲染应用
        const App = () => <WeatherApp />;
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
