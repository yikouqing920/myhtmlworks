<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能表格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #fff;
        }
        /* 万能表格标题：金色、25号字、居中 */
        .table-title {
            font-size: 25px;
            color: gold;
            font-weight: 500;
            text-align: center;
        }
        /* 表格容器：50%宽高、整体居中、1:1比例基础 */
        .table-wrap {
            width: 50%;
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 万能表格：1:1八格、单元格等宽等高、边框完整 */
        .universal-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 固定布局保证1:1比例 */
        }
        /* 单元格：1:1等宽等高、边框、内容居中 */
        .universal-table td {
            border: 1px solid #000;
            text-align: center;
            vertical-align: middle;
            font-size: 12px;
            color: #000; /* 纯黑色文字 */
            white-space: nowrap; /* 文字横排不换行 */
        }
    </style>
</head>
<body>
    <!-- 金色25号标题：万能表格 -->
    <h1 class="table-title">万能表格</h1>
    <!-- 表格容器：50%宽高、整体居中 -->
    <div class="table-wrap">
        <table class="universal-table">
            <tr>
                <td>加油</td>
                <td>努力</td>
                <td>幸运</td>
                <td>好运</td>
            </tr>
            <tr>
                <td>幸福</td>
                <td>平安</td>
                <td>健康</td>
                <td>暴富</td>
            </tr>
        </table>
    </div>
</body>
</html>
