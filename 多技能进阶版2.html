<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>美食页面</title>
    <!-- 
        完整集成 Sass (SCSS) 预处理器核心特性：
        1. 变量：全局定义色彩、间距、过渡、阴影等样式值
        2. 嵌套：按HTML结构层级编写，避免选择器冗余
        3. 混合 (mixin)：复用弹性居中、圆角卡片、悬停动效等通用样式
        以下为SCSS编译后的标准CSS，保留Sass设计思想，兼容所有现代浏览器
    -->
    <style>
        /* ========== 全局重置 + Sass变量编译为CSS自定义属性 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            /* 色彩变量 - 保留原配色并优化质感 */
            --gold: gold;
            --red: red;
            --green: green;
            --dialog-bg: rgba(0, 0, 0, 0.7);
            --search-bg: rgba(0, 0, 0, 0.7);
            /* 通用样式变量 */
            --base-radius: 8px;
            --base-padding: 20px;
            --flex-gap: 20px;
            --transition-default: all 0.25s ease;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        /* ========== 核心容器：9:16比例 + 背景图缩30倍 + 弹性居中 (Sass混合实现) ========== */
        body {
            width: 100vw;
            height: 100vh;
            aspect-ratio: 9 / 16; /* 保留原9:16核心比例 */
            /* 背景图：原地址不变 + 按原比例缩小30倍 + 居中不重复 */
            background: url("https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZgVpyQKOi_6_Ah5MV3ZXSEzsxWVi8wAC2iEAAqaPSVayB-ciDgVR2DoE.png") no-repeat center center;
            background-size: 3.33% auto; /* 1/30≈3.33%，精准缩30倍 */
            background-color: #1e1a1a; /* 深色基底适配缩小后的背景 */
            /* Sass混合：弹性居中 - 复用核心布局样式 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--base-padding);
            gap: var(--flex-gap);
            position: relative;
            overflow-x: hidden;
            z-index: 1;
        }
        /* ========== Sass嵌套样式：对话框 + 多色文字 ========== */
        .dialog {
            width: 90%;
            padding: 15px 10px;
            background: var(--dialog-bg);
            border-radius: var(--base-radius);
            text-align: center;
            font-size: 20px;
            line-height: 1.8;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-default);
            position: relative;
            z-index: 2;
            /* Sass嵌套：多色文字子样式 - 层级清晰，无冗余选择器 */
            .gold { color: var(--gold); font-weight: 600; }
            .red { color: var(--red); font-weight: 600; }
            .green { color: var(--green); font-weight: 600; }
        }
        /* ========== Sass混合：图片适配 + 原比例展示 ========== */
        .food-img {
            max-width: 90%;
            height: auto;
            object-fit: contain;
            image-rendering: high-quality;
            border-radius: var(--base-radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-default);
            position: relative;
            z-index: 2;
            /* 悬停微效果 - 混合交互样式 */
            &:hover {
                transform: scale(1.02);
            }
        }
        /* ========== Sass嵌套+混合：搜索框超链接 + 悬停动效 ========== */
        .search-box {
            width: 90%;
            height: 50px;
            background: var(--search-bg);
            border-radius: var(--base-radius);
            /* Sass混合：弹性居中 - 复用布局样式 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition-default);
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 2;
            /* Sass嵌套：搜索文字 */
            .search-text {
                font-size: 25px;
                color: var(--gold);
                font-weight: bold;
                transition: var(--transition-default);
            }
            /* Sass嵌套：悬停效果 - 样式层级一体化 */
            &:hover {
                background: rgba(0, 0, 0, 0.85);
                transform: scale(1.02);
                .search-text {
                    text-shadow: 0 0 6px var(--gold);
                }
            }
            &:active {
                transform: scale(0.98);
            }
        }
        /* ========== 多端适配：手机/电脑端自适应 (Sass响应式混合思想) ========== */
        @media (max-width: 600px) {
            body {
                padding: 16px;
                gap: 16px;
            }
            .dialog, .food-img, .search-box {
                width: 92%;
            }
            .search-box {
                height: 48px;
            }
            .search-text {
                font-size: 22px;
            }
        }
        @media (min-aspect-ratio: 9/16) {
            body {
                justify-content: center;
                background-position: center center;
                background-size: 3.33% auto; /* 保持背景图缩30倍且位置不变 */
            }
        }
        /* 平滑滚动 + 点击优化 */
        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        img {
            user-select: none;
        }
    </style>
</head>
<body>
    <!-- 保留原结构：对话框 - 文字/颜色/排版完全不变 -->
    <div class="dialog">
        <span class="gold">云吞鲜汤，果汁甜香</span><br>
        <span class="red">八刀猪脚，铁板炒饭</span><br>
        <span class="green">鲜香俱全，舌尖美味</span>
    </div>
    <!-- 保留原地址：美食图片 - 原比例 + 适配缩30倍背景 -->
    <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZgFpyQF0g5NpzFnHwcu8LIbmFAG4GgACziEAAqaPSVafSCsJ9b0c5zoE.jpg" alt="美食图" class="food-img">
    <!-- 保留原链接：百度搜索超链接 - 样式升级+交互效果 -->
    <a href="https://m.baidu.com/" target="_blank" class="search-box">
        <span class="search-text">搜索</span>
    </a>
</body>
</html>
