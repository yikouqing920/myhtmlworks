<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .video-box {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
        }
        /* 茶山日常标题样式：金色、加粗、25号字 */
        .video-title {
            font-size: 25px;
            font-weight: bold;
            color: gold;
            margin-bottom: 15px;
        }
        /* 视频适配样式 */
        video {
            width: 100%;
            height: auto;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="video-box">
        <!-- 视频外部上方的标题 -->

</html>
